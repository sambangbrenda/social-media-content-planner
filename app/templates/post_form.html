{% extends 'base.html' %}
{% block title %}New Post - Social Media Content Planner{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-10">
    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Create New Post</h3>
        <a href="{{ url_for('main.posts') }}" class="btn btn-outline-secondary">Back</a>
      </div>

      <form method="POST" action="{{ url_for('main.new_post') }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Campaign</label>
            <select class="form-select" name="campaign_id" required>
              <option value="">Select campaign</option>
              {% for campaign in campaigns %}
                <option value="{{ campaign.id }}">{{ campaign.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Platform</label>
            <select class="form-select" name="platform" required>
              <option value="">Select platform</option>
              <option value="Facebook">Facebook</option>
              <option value="Instagram">Instagram</option>
              <option value="LinkedIn">LinkedIn</option>
              <option value="TikTok">TikTok</option>
              <option value="X">X</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Post Title</label>
            <input type="text" class="form-control" name="title" placeholder="Enter a title for your post" required>
          </div>

          <div class="col-12">
            <label class="form-label">Content / Caption</label>
            <textarea class="form-control" rows="5" name="content" placeholder="Write your caption or content here..." required></textarea>
          </div>

          <div class="col-md-4">
            <label class="form-label">Schedule Date & Time</label>
            <input type="datetime-local" class="form-control" name="scheduled_at">
          </div>

          <div class="col-md-4">
            <label class="form-label">Status</label>
            <select class="form-select" name="status">
              <option value="Draft">Draft</option>
              <option value="Scheduled">Scheduled</option>
              <option value="Posted">Posted</option>
            </select>
          </div>

          <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary">Save Post</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
