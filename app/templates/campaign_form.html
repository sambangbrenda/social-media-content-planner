{% extends 'base.html' %}
{% block title %}New Campaign - Content Planner{% endblock %}
{% block page_title %}Create Campaign{% endblock %}

{% block content %}
<div class="cardx form-card">
  <div class="section-card">
    <div class="section-head">
      <h5>Create New Campaign</h5>
      <a href="{{ url_for('main.campaigns') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Back</a>
    </div>

    <form method="POST" action="{{ url_for('main.new_campaign') }}">
      <div class="mb-3">
        <label class="form-label">Campaign Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter campaign name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="4" placeholder="Describe the campaign"></textarea>
      </div>

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Start Date</label>
          <input type="date" name="start_date" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">End Date</label>
          <input type="date" name="end_date" class="form-control">
        </div>
      </div>

      <div class="text-end mt-4">
        <button type="submit" class="btn btn-primary px-4">Save Campaign</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
